<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Sistem Mutabaah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: #15803d;
      color: white;
      font-family: Arial, sans-serif;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top: 5px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>

  <script>
    setTimeout(function() {
      window.location.href = "https://script.google.com/macros/s/AKfycbxn-y8E8A3VzY-TipdlICow8JUHtR9xPMeyJ2RWdC8inRHbYDDR5MtLJWyKdlLL6XIO/exec";
    }, 1500);
  </script>
</head>
<body>
  <div class="spinner"></div>
  <h2>Memuat Sistem Mutabaah...</h2>
</body>
</html>
