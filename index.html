<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mutabaah Apps</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f1f5f9;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #15803d;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 16px;
      color: #15803d;
    }
  </style>
</head>

<body>

  <header>
    Sistem Mutabaah
  </header>

  <div class="loading" id="loadingText">Memuat aplikasi...</div>

  <iframe 
    src="https://script.google.com/macros/s/AKfycbxn-y8E8A3VzY-TipdlICow8JUHtR9xPMeyJ2RWdC8inRHbYDDR5MtLJWyKdlLL6XIO/exec"
    onload="document.getElementById('loadingText').style.display='none';">
  </iframe>

</body>
</html>
